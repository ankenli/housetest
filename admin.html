<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>主管後台 — 房仲 CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Noto Sans TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f0f2f5;--card:#fff;--ink:#1a1d23;--muted:#7a8190;--line:#e8eaed;
  --accent:#1d4ed8;--accent-bg:#eff4ff;
  --buyer:#0e7a4f;--buyer-bg:#dcfce7;--seller:#b45309;--seller-bg:#fef3c7;
  --red:#dc2626;--red-bg:#fef2f2;--green:#16a34a;--green-bg:#f0fdf4;
  --radius:12px;--radius-sm:8px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--ink);font-family:"Noto Sans TC",sans-serif;font-size:15px;min-height:100vh;}

/* LOGIN */
#loginPage{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;}
.login-box{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:40px 32px;max-width:400px;width:100%;box-shadow:0 4px 32px rgba(0,0,0,.08);}
.login-logo{font-size:26px;font-weight:700;margin-bottom:4px;}
.login-sub{color:var(--muted);font-size:13px;margin-bottom:32px;}
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
.field label{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;}
.field input{border:1px solid var(--line);border-radius:var(--radius-sm);padding:12px 14px;font-size:15px;font-family:inherit;background:var(--bg);color:var(--ink);outline:none;}
.field input:focus{border-color:var(--accent);}
.btn-primary{width:100%;border:none;background:var(--accent);color:#fff;border-radius:var(--radius-sm);padding:13px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;margin-top:6px;}
.btn-primary:active{opacity:.88;}
.err-msg{color:var(--red);font-size:13px;margin-top:10px;display:none;}

/* LOADING */
#loadingPage{display:none;align-items:center;justify-content:center;min-height:100vh;color:var(--muted);font-size:14px;}

/* LAYOUT */
#mainPage{display:none;}
.sidebar{position:fixed;top:0;left:0;bottom:0;width:220px;background:var(--ink);display:flex;flex-direction:column;z-index:30;}
.sb-logo{padding:24px 20px 16px;font-size:16px;font-weight:700;color:#fff;border-bottom:1px solid rgba(255,255,255,.1);}
.sb-logo span{color:#93c5fd;font-size:12px;display:block;font-weight:400;margin-top:2px;}
.sb-nav{flex:1;padding:12px 10px;overflow-y:auto;}
.sb-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius-sm);color:rgba(255,255,255,.65);cursor:pointer;font-size:14px;font-weight:500;margin-bottom:2px;}
.sb-item:hover{background:rgba(255,255,255,.08);color:#fff;}
.sb-item.active{background:var(--accent);color:#fff;}
.sb-item .icon{font-size:16px;width:20px;text-align:center;}
.sb-bottom{padding:14px 10px;border-top:1px solid rgba(255,255,255,.1);}
.sb-logout{display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:var(--radius-sm);color:rgba(255,255,255,.5);cursor:pointer;font-size:13px;}
.sb-logout:hover{color:#fff;background:rgba(255,255,255,.08);}
.main-area{margin-left:220px;min-height:100vh;padding:28px 28px 60px;}
.page-title{font-size:22px;font-weight:700;margin-bottom:6px;}
.page-sub{font-size:13px;color:var(--muted);margin-bottom:24px;}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px;margin-bottom:28px;}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px 16px;}
.kpi-val{font-size:32px;font-weight:700;line-height:1;margin-bottom:4px;}
.kpi-label{font-size:12px;color:var(--muted);font-weight:500;}
.kpi.buyer .kpi-val{color:var(--buyer);}
.kpi.seller .kpi-val{color:var(--seller);}
.kpi.match .kpi-val{color:var(--accent);}

/* TABLE */
.toolbar{display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap;}
.toolbar-title{font-size:16px;font-weight:700;flex:1;}
.sync-row{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);}
.sync-dot{width:8px;height:8px;border-radius:50%;}
.sync-dot.ok{background:var(--green);}
.sync-dot.ing{background:#f59e0b;}
.sync-dot.err{background:var(--red);}
.search-sm{border:1px solid var(--line);border-radius:var(--radius-sm);padding:8px 12px;font-size:14px;font-family:inherit;background:var(--card);color:var(--ink);width:200px;}
.filter-select{border:1px solid var(--line);border-radius:var(--radius-sm);padding:8px 12px;font-size:14px;font-family:inherit;background:var(--card);color:var(--ink);}
.tcard{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;}
table{width:100%;border-collapse:collapse;}
thead tr{background:var(--bg);}
th{padding:11px 14px;font-size:12px;font-weight:700;color:var(--muted);text-align:left;letter-spacing:.04em;border-bottom:1px solid var(--line);}
td{padding:13px 14px;font-size:14px;border-bottom:1px solid var(--line);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr.clickable:hover td{background:#f8f9ff;cursor:pointer;}
.role-badge{font-size:11px;font-weight:700;border-radius:99px;padding:3px 9px;white-space:nowrap;}
.rb-buyer{background:var(--buyer-bg);color:var(--buyer);}
.rb-seller{background:var(--seller-bg);color:var(--seller);}
.agent-tag{font-size:12px;background:var(--bg);border:1px solid var(--line);border-radius:99px;padding:3px 9px;color:var(--muted);}
.empty-row td{text-align:center;color:var(--muted);padding:36px 0;}

/* MATCH */
.match-grid{display:grid;gap:12px;}
.mcard{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;display:flex;gap:16px;}
.mcard-score{min-width:52px;height:52px;border-radius:50%;background:var(--accent-bg);color:var(--accent);font-size:16px;font-weight:700;display:flex;align-items:center;justify-content:center;border:2px solid var(--accent);}
.mcard-body{flex:1;}
.mcard-row{display:flex;gap:8px;align-items:center;margin-bottom:6px;flex-wrap:wrap;}
.mcard-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;}
.mtag{font-size:12px;background:var(--bg);border:1px solid var(--line);border-radius:99px;padding:3px 9px;color:var(--muted);}
.mtag.hit{background:var(--green-bg);border-color:var(--green);color:var(--green);}

/* STATS */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.stat-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:20px;}
.stat-card-title{font-size:13px;font-weight:700;color:var(--muted);margin-bottom:16px;}
.agent-row{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.agent-name{font-size:14px;font-weight:500;min-width:72px;}
.bar-wrap{flex:1;background:var(--bg);border-radius:99px;height:8px;overflow:hidden;}
.bar-fill{height:100%;border-radius:99px;background:var(--accent);}
.bar-num{font-size:13px;font-weight:700;min-width:28px;text-align:right;}
.region-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--line);font-size:14px;}
.region-row:last-child{border-bottom:none;}
.region-cnt{font-weight:700;color:var(--accent);}

/* ACCOUNTS */
.acc-grid{display:grid;gap:10px;margin-bottom:20px;}
.acc-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;display:flex;align-items:center;gap:14px;}
.acc-avatar{width:40px;height:40px;border-radius:50%;background:var(--accent-bg);color:var(--accent);font-size:18px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.acc-info{flex:1;}
.acc-name{font-size:15px;font-weight:700;}
.acc-meta{font-size:12px;color:var(--muted);margin-top:2px;}
.acc-badge{font-size:11px;font-weight:700;border-radius:99px;padding:3px 9px;}
.acc-badge.active{background:var(--green-bg);color:var(--green);}
.acc-badge.boss{background:#fef3c7;color:#b45309;}
.acc-actions{display:flex;gap:8px;}
.btn-sm{border:1px solid var(--line);background:var(--bg);color:var(--ink);border-radius:var(--radius-sm);padding:6px 14px;font-size:13px;font-family:inherit;cursor:pointer;font-weight:500;}
.btn-sm:hover{background:var(--line);}
.btn-sm.danger{border-color:var(--red);color:var(--red);}
.btn-sm.danger:hover{background:var(--red-bg);}
.add-acc-card{background:var(--card);border:2px dashed var(--line);border-radius:var(--radius);padding:20px;margin-bottom:20px;}
.add-acc-title{font-size:14px;font-weight:700;margin-bottom:14px;color:var(--muted);}
.acc-form-row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;}
.acc-field{display:flex;flex-direction:column;gap:5px;flex:1;min-width:120px;}
.acc-field label{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.04em;}
.acc-field input{border:1px solid var(--line);border-radius:var(--radius-sm);padding:9px 12px;font-size:14px;font-family:inherit;background:var(--bg);color:var(--ink);outline:none;}
.acc-field input:focus{border-color:var(--accent);}
.btn-add-acc{border:none;background:var(--accent);color:#fff;border-radius:var(--radius-sm);padding:10px 20px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;white-space:nowrap;}

/* MODAL */
#modalOverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:50;align-items:center;justify-content:center;padding:20px;}
.modal{background:var(--card);border-radius:20px;max-width:520px;width:100%;max-height:90vh;overflow-y:auto;padding:28px;}
.modal-header{display:flex;align-items:center;gap:12px;margin-bottom:20px;}
.modal-title{font-size:20px;font-weight:700;flex:1;}
.modal-close{border:none;background:none;font-size:24px;cursor:pointer;color:var(--muted);}
.msec{margin-bottom:16px;}
.msec-title{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.07em;text-transform:uppercase;margin-bottom:10px;}
.mfield{display:flex;gap:8px;margin-bottom:8px;}
.mf-label{font-size:13px;color:var(--muted);min-width:72px;}
.mf-val{font-size:14px;font-weight:500;flex:1;}
.note-chip{background:var(--bg);border-radius:var(--radius-sm);padding:8px 12px;margin-bottom:6px;}
.note-chip-meta{font-size:11px;color:var(--muted);margin-bottom:3px;}
.note-chip-text{font-size:14px;}

/* SINGLE CLIENT */
.sc-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;display:flex;gap:14px;align-items:flex-start;margin-bottom:10px;}
.sc-score{min-width:56px;height:56px;border-radius:50%;font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;border:2px solid;flex-shrink:0;}
.sc-score.high{background:#dcfce7;color:#0e7a4f;border-color:#0e7a4f;}
.sc-score.mid{background:#eff4ff;color:#1d4ed8;border-color:#1d4ed8;}
.sc-score.low{background:#fef3c7;color:#b45309;border-color:#b45309;}
.sc-body{flex:1;min-width:0;}
.sc-name{font-size:15px;font-weight:700;margin-bottom:4px;}
.sc-meta{font-size:12px;color:var(--muted);margin-bottom:8px;line-height:1.6;}
.sc-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;}
.sc-breakdown{background:var(--bg);border-radius:var(--radius-sm);padding:10px 12px;display:none;}
.sc-breakdown.open{display:block;}
.sc-breakdown-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--line);font-size:13px;}
.sc-breakdown-row:last-child{border-bottom:none;}
.sc-breakdown-label{color:var(--muted);}
.sc-breakdown-val{font-weight:700;}
.sc-breakdown-val.hit{color:var(--green);}
.sc-breakdown-val.miss{color:var(--muted);}
.sc-breakdown-val.partial{color:var(--gold);}
.sc-detail-btn{border:1px solid var(--line);background:var(--bg);color:var(--muted);border-radius:var(--radius-sm);padding:5px 12px;font-size:12px;font-family:inherit;cursor:pointer;font-weight:500;}
.sc-detail-btn:hover{background:var(--line);}
.sc-empty{text-align:center;color:var(--muted);padding:48px 0;font-size:14px;}

@media(max-width:768px){
  .sidebar{width:100%;height:56px;flex-direction:row;bottom:auto;}
  .sb-logo{padding:0 16px;border-bottom:none;border-right:1px solid rgba(255,255,255,.1);height:100%;display:flex;align-items:center;}
  .sb-logo span{display:none;}
  .sb-nav{display:flex;padding:0 4px;overflow-x:auto;}
  .sb-item{flex-direction:column;gap:1px;padding:6px 8px;font-size:10px;white-space:nowrap;}
  .sb-bottom{display:none;}
  .main-area{margin-left:0;margin-top:56px;padding:16px 14px 60px;}
  .stats-grid{grid-template-columns:1fr;}
  .acc-form-row{flex-direction:column;}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginPage">
<div class="login-box">
  <div class="login-logo">🏢 主管後台</div>
  <div class="login-sub">房仲 CRM · 管理介面</div>
  <div class="field"><label>主管帳號</label><input id="adminUser" type="text" placeholder="請輸入帳號" autocomplete="username"></div>
  <div class="field"><label>主管密碼</label><input id="adminPw" type="password" placeholder="請輸入密碼" autocomplete="current-password"></div>
  <div class="field" id="ghTokenField" style="display:none"><label>GitHub Token（首次設定）</label><input id="ghTokenInput" type="password" placeholder="ghp_xxxxxxxx" autocomplete="off"></div>
  <button class="btn-primary" id="loginBtn">進入後台</button>
  <div class="err-msg" id="loginErr">帳號或密碼錯誤</div>
</div>
</div>

<!-- LOADING -->
<div id="loadingPage"><div>載入資料中...</div></div>

<!-- MAIN -->
<div id="mainPage">
<div class="sidebar">
  <div class="sb-logo">🏢 主管後台<span>房仲 CRM</span></div>
  <div class="sb-nav">
    <div class="sb-item active" data-sec="overview"><span class="icon">📊</span>總覽</div>
    <div class="sb-item" data-sec="clients"><span class="icon">👥</span>所有客戶</div>
    <div class="sb-item" data-sec="match"><span class="icon">🔗</span>配對結果</div>
    <div class="sb-item" data-sec="single"><span class="icon">🔍</span>單客查詢</div>
    <div class="sb-item" data-sec="stats"><span class="icon">📈</span>業績統計</div>
    <div class="sb-item" data-sec="accounts"><span class="icon">🔑</span>帳號管理</div>
  </div>
  <div class="sb-bottom">
    <div class="sb-logout" id="logoutBtn">🚪 登出</div>
  </div>
</div>

<div class="main-area">

  <!-- 總覽 -->
  <div id="sec-overview" class="section">
    <div class="page-title">總覽</div>
    <div class="page-sub" id="overviewSub"></div>
    <div class="kpi-grid" id="kpiGrid"></div>
    <div class="toolbar"><div class="toolbar-title">最新動態</div><div class="sync-row"><div class="sync-dot ok" id="syncDot"></div><span id="syncLabel">已同步</span></div></div>
    <div class="tcard"><table><thead><tr><th>客戶</th><th>身份</th><th>負責業務</th><th>地區</th><th>建案/偏好</th></tr></thead><tbody id="recentBody"></tbody></table></div>
  </div>

  <!-- 所有客戶 -->
  <div id="sec-clients" class="section" style="display:none">
    <div class="page-title">所有客戶</div>
    <div class="page-sub">點擊任一客戶查看詳情</div>
    <div class="toolbar">
      <input class="search-sm" id="clientSearch" type="search" placeholder="搜尋姓名、建案、地區...">
      <select class="filter-select" id="roleFilter"><option value="">全部身份</option><option value="buyer">🟢 買方</option><option value="seller">🟡 賣方</option></select>
      <select class="filter-select" id="agentFilter"><option value="">全部業務</option></select>
    </div>
    <div class="tcard"><table><thead><tr><th>姓名</th><th>身份</th><th>地區</th><th>建案/偏好</th><th>格局</th><th>預算/開價</th><th>負責業務</th></tr></thead><tbody id="clientBody"></tbody></table></div>
  </div>

  <!-- 配對 -->
  <div id="sec-match" class="section" style="display:none">
    <div class="page-title">買賣方配對</div>
    <div class="page-sub">依地區、格局、預算自動比對</div>
    <div class="toolbar">
      <select class="filter-select" id="matchRegion"><option value="">全部地區</option></select>
      <button class="btn-primary" style="width:auto;padding:9px 20px;font-size:14px;" id="runMatchBtn">🔄 重新整理</button>
    </div>
    <div class="match-grid" id="matchGrid"></div>
  </div>

  <!-- 統計 -->
  <div id="sec-stats" class="section" style="display:none">
    <div class="page-title">業績統計</div>
    <div class="page-sub">各業務客戶數與地區分布</div>
    <div class="stats-grid" id="statsGrid"></div>
  </div>

  <!-- 帳號管理 -->
  <div id="sec-accounts" class="section" style="display:none">
    <div class="page-title">帳號管理</div>
    <div class="page-sub">新增或停用業務帳號，刪除後客戶自動歸屬「老闆」</div>

    <div class="add-acc-card">
      <div class="add-acc-title">➕ 新增業務帳號</div>
      <div class="acc-form-row">
        <div class="acc-field"><label>顯示名稱</label><input id="newDisplayName" type="text" placeholder="王小明"></div>
        <div class="acc-field"><label>帳號</label><input id="newUsername" type="text" placeholder="agent01"></div>
        <div class="acc-field"><label>密碼</label><input id="newPassword" type="text" placeholder="設定密碼"></div>
        <button class="btn-add-acc" id="addAccBtn">新增</button>
      </div>
      <div class="err-msg" id="accErr" style="display:none;margin-top:8px;"></div>
    </div>

    <div class="acc-grid" id="accGrid"></div>
  </div>

  <!-- 單客查詢 -->
  <div id="sec-single" class="section" style="display:none">
    <div class="page-title">單客查詢</div>
    <div class="page-sub">選定一位客戶，查看他與所有對方的配對分數</div>

    <div class="tcard" style="padding:18px;margin-bottom:16px;">
      <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;">
        <div style="display:flex;flex-direction:column;gap:6px;flex:1;min-width:160px;">
          <label style="font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.04em;">查詢身份</label>
          <select class="filter-select" id="singleRole" style="width:100%">
            <option value="buyer">🟢 買方（查配對賣方）</option>
            <option value="seller">🟡 賣方（查配對買方）</option>
          </select>
        </div>
        <div style="display:flex;flex-direction:column;gap:6px;flex:2;min-width:200px;">
          <label style="font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.04em;">選擇客戶</label>
          <select class="filter-select" id="singleClient" style="width:100%"><option value="">— 請選擇 —</option></select>
        </div>
        <div style="display:flex;flex-direction:column;gap:6px;flex:1;min-width:140px;">
          <label style="font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.04em;">條件篩選</label>
          <select class="filter-select" id="singleFilter" style="width:100%">
            <option value="all">全部條件</option>
            <option value="region">📍 地區符合</option>
            <option value="price">💰 預算符合</option>
            <option value="layout">🏠 格局符合</option>
            <option value="size">📐 坪數符合</option>
            <option value="project">🏢 偏好吻合</option>
          </select>
        </div>
      </div>
    </div>

    <div id="singleResult"></div>
  </div>

</div>
</div>

<!-- DETAIL MODAL -->
<div id="modalOverlay">
<div class="modal">
  <div class="modal-header">
    <div class="modal-title" id="modalTitle"></div>
    <button class="modal-close" id="modalClose">✕</button>
  </div>
  <div id="modalBody"></div>
</div>
</div>

<script>
// ── CONFIG ──
const GH_USER = 'ankenli';
const GH_REPO = 'housetest';
const ADMIN_PW_HASH = 'anken';       // ← 主管密碼（明碼，之後可改）
const ADMIN_USER = 'anken';              // ← 主管帳號
const BOSS_NAME = '老闆';

const CLIENTS_URL = `https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/clients.json`;
const ACCOUNTS_URL = `https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/accounts.json`;

let GH_TOKEN = localStorage.getItem('admin_gh_token') || '';
function ghHeaders(){ return { Authorization:'token '+GH_TOKEN, Accept:'application/vnd.github.v3+json', 'Content-Type':'application/json' }; }

// ── GH HELPERS ──
async function ghGet(url){
  console.log('[CRM-DEBUG] fetching:', url);
  let r;
  try{
    r=await fetch(url,{headers:ghHeaders()});
  }catch(fetchErr){
    console.error('[CRM-DEBUG] fetch() threw an error before getting a response:', fetchErr);
    throw fetchErr;
  }
  console.log('[CRM-DEBUG] response status:', r.status);
  if(r.status===404)return null;
  if(!r.ok){
    const bodyText=await r.text().catch(()=>'(could not read body)');
    console.error('[CRM-DEBUG] GitHub API error body:', bodyText);
    throw new Error('GitHub API '+r.status+': '+bodyText);
  }
  const d=await r.json();
  return{data:JSON.parse(decodeURIComponent(escape(atob(d.content.replace(/\n/g,''))))),sha:d.sha};
}
async function ghPut(url,data,sha){
  const content=btoa(unescape(encodeURIComponent(JSON.stringify(data,null,2))));
  const body={message:'admin update',content};if(sha)body.sha=sha;
  const r=await fetch(url,{method:'PUT',headers:ghHeaders(),body:JSON.stringify(body)});
  if(!r.ok){const bodyText=await r.text().catch(()=>'');throw new Error('GitHub API '+r.status+': '+bodyText);}
  const d=await r.json();return d.content?.sha;
}
function setSyncDot(s){
  const dot=document.getElementById('syncDot'),lbl=document.getElementById('syncLabel');
  if(!dot)return;
  dot.className='sync-dot '+s;
  lbl.textContent=s==='ok'?'已同步':s==='ing'?'同步中...':'同步失敗';
}

async function loadAll(){
  try{
    const [cr,ar]=await Promise.all([ghGet(CLIENTS_URL),ghGet(ACCOUNTS_URL)]);
    clients=cr?cr.data:[];clientsSha=cr?.sha||null;
    accounts=ar?ar.data:[];accountsSha=ar?.sha||null;
    sessionStorage.setItem('admin_ok','1');
    show('mainPage');buildAll();setSyncDot('ok');
  }catch(e){
    console.error('[CRM-DEBUG] loadAll failed:', e);
    // 401 時清掉 Token，下次要重新輸入
    if(e.message&&e.message.includes('401')){localStorage.removeItem('admin_gh_token');GH_TOKEN='';document.getElementById('ghTokenField').style.display='flex';}
    show('loginPage');
    document.getElementById('loginErr').textContent='載入失敗：'+(e&&e.message?e.message:'未知錯誤');
    document.getElementById('loginErr').style.display='block';
  }
}

function show(id){
  ['loginPage','loadingPage','mainPage'].forEach(p=>{
    const el=document.getElementById(p);if(!el)return;
    el.style.display=p===id?(p==='loadingPage'?'flex':'block'):'none';
  });
}

// ── MATCH ──
function parseSize(str){
  // 解析坪數字串，回傳 {min, max}，例如 "30～50坪" → {min:30,max:50}，"45坪" → {min:45,max:45}
  if(!str)return null;
  const nums=str.replace(/[^\d～~\-\.]/g,'').split(/[～~\-]/).map(Number).filter(n=>!isNaN(n)&&n>0);
  if(nums.length===2)return{min:nums[0],max:nums[1]};
  if(nums.length===1)return{min:nums[0],max:nums[0]};
  return null;
}
function runMatch(){
  const buyers=clients.filter(c=>c.role==='buyer');
  const sellers=clients.filter(c=>c.role==='seller');
  const matches=[];
  buyers.forEach(b=>{sellers.forEach(s=>{
    // 地區不符合直接淘汰
    if(!b.region||!s.region||b.region!==s.region)return;

    let score=35;const hits=['✅ 地區相符'];

    // 2. 預算 vs 開價（25分 / 部分12分）
    if(b.budgetMax&&s.sellPrice){
      const bMax=parseInt(b.budgetMax),sp=parseInt(s.sellPrice);
      if(!isNaN(bMax)&&!isNaN(sp)){
        if(sp<=bMax){score+=25;hits.push('✅ 預算符合');}
        else if(sp<=bMax*1.15){score+=12;hits.push('⚠️ 預算略超');}
      }
    }

    // 3. 格局（20分）
    if(b.buyLayout&&s.sellLayout&&b.buyLayout===s.sellLayout){score+=20;hits.push('✅ 格局相符');}

    // 4. 坪數（10分 / 部分5分）
    const bSize=parseSize(b.buySize);
    const sSize=parseSize(s.sellSize);
    if(bSize&&sSize){
      const sellMid=(sSize.min+sSize.max)/2;
      if(sellMid>=bSize.min&&sellMid<=bSize.max){score+=10;hits.push('✅ 坪數符合');}
      else{
        const gap=sellMid<bSize.min?(bSize.min-sellMid)/bSize.min:(sellMid-bSize.max)/bSize.max;
        if(gap<=0.1){score+=5;hits.push('⚠️ 坪數略差');}
      }
    }

    // 5. 建案/區域偏好關鍵字（10分）
    if(b.buyProject&&s.sellProject){
      const bProj=b.buyProject.toLowerCase();
      const sProj=s.sellProject.toLowerCase();
      const keywords=bProj.split(/[\s,，、]+/).filter(k=>k.length>=2);
      const matched=keywords.some(k=>sProj.includes(k))||sProj.split(/[\s,，、]+/).some(k=>k.length>=2&&bProj.includes(k));
      if(matched){score+=10;hits.push('✅ 偏好吻合');}
    }

    matches.push({buyer:b,seller:s,score,hits});
  });});
  return matches.sort((a,b)=>b.score-a.score);
}

// ── SINGLE CLIENT ──
function scorePair(b, s){
  // 完整配對計算，回傳 {score, detail}
  const detail = {
    region:  {score:0, max:35, label:'地區', hit:''},
    price:   {score:0, max:25, label:'預算', hit:''},
    layout:  {score:0, max:20, label:'格局', hit:''},
    size:    {score:0, max:10, label:'坪數', hit:''},
    project: {score:0, max:10, label:'偏好', hit:''},
  };
  // 地區
  if(b.region&&s.region&&b.region===s.region){detail.region.score=35;detail.region.hit='hit';}
  // 預算
  if(b.budgetMax&&s.sellPrice){
    const bMax=parseInt(b.budgetMax),sp=parseInt(s.sellPrice);
    if(!isNaN(bMax)&&!isNaN(sp)){
      if(sp<=bMax){detail.price.score=25;detail.price.hit='hit';}
      else if(sp<=bMax*1.15){detail.price.score=12;detail.price.hit='partial';}
    }
  }
  // 格局
  if(b.buyLayout&&s.sellLayout&&b.buyLayout===s.sellLayout){detail.layout.score=20;detail.layout.hit='hit';}
  // 坪數
  const bSize=parseSize(b.buySize),sSize=parseSize(s.sellSize);
  if(bSize&&sSize){
    const mid=(sSize.min+sSize.max)/2;
    if(mid>=bSize.min&&mid<=bSize.max){detail.size.score=10;detail.size.hit='hit';}
    else{const gap=mid<bSize.min?(bSize.min-mid)/bSize.min:(mid-bSize.max)/bSize.max;if(gap<=0.1){detail.size.score=5;detail.size.hit='partial';}}
  }
  // 偏好
  if(b.buyProject&&s.sellProject){
    const bP=b.buyProject.toLowerCase(),sP=s.sellProject.toLowerCase();
    const kw=bP.split(/[\s,，、]+/).filter(k=>k.length>=2);
    if(kw.some(k=>sP.includes(k))||sP.split(/[\s,，、]+/).some(k=>k.length>=2&&bP.includes(k))){detail.project.score=10;detail.project.hit='hit';}
  }
  const score=Object.values(detail).reduce((s,d)=>s+d.score,0);
  return{score,detail};
}

function buildSingle(){
  const role=document.getElementById('singleRole').value;
  const sel=document.getElementById('singleClient');
  const list=clients.filter(c=>c.role===role);
  const cur=sel.value;
  sel.innerHTML='<option value="">— 請選擇 —</option>'+list.map(c=>`<option value="${c.id}">${esc(c.name)}${c.agent?' ('+esc(c.agent)+')':''}</option>`).join('');
  if(cur)sel.value=cur;
  renderSingle();
}
function renderSingle(){
  const role=document.getElementById('singleRole').value;
  const clientId=document.getElementById('singleClient').value;
  const filterKey=document.getElementById('singleFilter').value;
  const result=document.getElementById('singleResult');
  if(!clientId){result.innerHTML='<div class="sc-empty">請先選擇一位客戶</div>';return;}
  const target=clients.find(c=>c.id===clientId);
  if(!target){result.innerHTML='<div class="sc-empty">找不到客戶</div>';return;}
  const opponents=clients.filter(c=>c.role!==(role==='buyer'?'buyer':'seller')&&c.role===(role==='buyer'?'seller':'buyer'));
  let pairs=opponents.map(op=>{
    const b=role==='buyer'?target:op;
    const s=role==='buyer'?op:target;
    const {score,detail}=scorePair(b,s);
    return{op,score,detail};
  });
  // 條件篩選
  if(filterKey!=='all') pairs=pairs.filter(p=>p.detail[filterKey]?.hit==='hit');
  pairs.sort((a,b)=>b.score-a.score);
  if(!pairs.length){result.innerHTML='<div class="sc-empty">沒有符合條件的配對</div>';return;}

  const oppRole=role==='buyer'?'seller':'buyer';
  result.innerHTML=pairs.map((p,i)=>{
    const scoreClass=p.score>=80?'high':p.score>=60?'mid':'low';
    const op=p.op;
    const d=p.detail;
    const money=oppRole==='seller'?(op.sellPrice?`開價 ${op.sellPrice}萬`:''):(op.budgetMax?`預算 ${op.budgetMin||'?'}～${op.budgetMax}萬`:'');
    return`<div class="sc-card">
      <div class="sc-score ${scoreClass}">${p.score}%</div>
      <div class="sc-body">
        <div class="sc-name">${esc(op.name)} <span style="font-size:12px;font-weight:400;color:var(--muted);">${esc(op.agent||'')}</span></div>
        <div class="sc-meta">
          ${op.region?`📍 ${esc(op.region)}`:''}
          ${money?` ‧ 💰 ${money}`:''}
          ${(oppRole==='seller'?op.sellLayout:op.buyLayout)?` ‧ ${esc((oppRole==='seller'?op.sellLayout:op.buyLayout))}`:''}
          ${(oppRole==='seller'?op.sellSize:op.buySize)?` ‧ ${esc((oppRole==='seller'?op.sellSize:op.buySize))}`:''}
          ${(oppRole==='seller'?op.sellProject:op.buyProject)?` ‧ 🏢 ${esc((oppRole==='seller'?op.sellProject:op.buyProject))}`:''}
        </div>
        <div class="sc-tags">
          ${d.region.hit==='hit'?'<span class="mtag hit">✅ 地區</span>':''}
          ${d.price.hit==='hit'?'<span class="mtag hit">✅ 預算</span>':d.price.hit==='partial'?'<span class="mtag" style="background:#fef3c7;border-color:#b45309;color:#b45309">⚠️ 預算略超</span>':''}
          ${d.layout.hit==='hit'?'<span class="mtag hit">✅ 格局</span>':''}
          ${d.size.hit==='hit'?'<span class="mtag hit">✅ 坪數</span>':d.size.hit==='partial'?'<span class="mtag" style="background:#fef3c7;border-color:#b45309;color:#b45309">⚠️ 坪數略差</span>':''}
          ${d.project.hit==='hit'?'<span class="mtag hit">✅ 偏好</span>':''}
        </div>
        <button class="sc-detail-btn" onclick="toggleBreakdown(this,'bd_${i}')">查看詳情 ▾</button>
        <div class="sc-breakdown" id="bd_${i}">
          <div class="sc-breakdown-row"><span class="sc-breakdown-label">📍 地區（最高35分）</span><span class="sc-breakdown-val ${d.region.hit||'miss'}">${d.region.score}分 ${d.region.hit==='hit'?'✅':d.region.hit==='partial'?'⚠️':'—'}</span></div>
          <div class="sc-breakdown-row"><span class="sc-breakdown-label">💰 預算（最高25分）</span><span class="sc-breakdown-val ${d.price.hit||'miss'}">${d.price.score}分 ${d.price.hit==='hit'?'✅':d.price.hit==='partial'?'⚠️略超':'—'}</span></div>
          <div class="sc-breakdown-row"><span class="sc-breakdown-label">🏠 格局（最高20分）</span><span class="sc-breakdown-val ${d.layout.hit||'miss'}">${d.layout.score}分 ${d.layout.hit==='hit'?'✅':'—'}</span></div>
          <div class="sc-breakdown-row"><span class="sc-breakdown-label">📐 坪數（最高10分）</span><span class="sc-breakdown-val ${d.size.hit||'miss'}">${d.size.score}分 ${d.size.hit==='hit'?'✅':d.size.hit==='partial'?'⚠️略差':'—'}</span></div>
          <div class="sc-breakdown-row"><span class="sc-breakdown-label">🏢 偏好（最高10分）</span><span class="sc-breakdown-val ${d.project.hit||'miss'}">${d.project.score}分 ${d.project.hit==='hit'?'✅':'—'}</span></div>
          <div class="sc-breakdown-row" style="font-weight:700;font-size:14px;"><span>總分</span><span class="sc-breakdown-val ${scoreClass==='high'?'hit':scoreClass==='mid'?'':''}" style="color:${scoreClass==='high'?'var(--green)':scoreClass==='mid'?'var(--accent)':'var(--gold)'}">${p.score} / 100</span></div>
        </div>
      </div>
    </div>`;
  }).join('');
}

  const agentCounts=agentList.map(a=>({name:a,count:clients.filter(c=>c.agent===a).length})).sort((a,b)=>b.count-a.count);
  const maxCount=agentCounts[0]?.count||1;
  const regionMap={};clients.forEach(c=>{if(c.region)regionMap[c.region]=(regionMap[c.region]||0)+1;});
  const regions=Object.entries(regionMap).sort((a,b)=>b[1]-a[1]);
  const buyerCount=clients.filter(c=>c.role==='buyer').length;
  const sellerCount=clients.filter(c=>c.role==='seller').length;
  document.getElementById('statsGrid').innerHTML=`
    <div class="stat-card"><div class="stat-card-title">業務客戶數</div>
      ${agentCounts.length?agentCounts.map(a=>`
        <div class="agent-row"><div class="agent-name">${esc(a.name)}</div>
          <div class="bar-wrap"><div class="bar-fill" style="width:${Math.round(a.count/maxCount*100)}%"></div></div>
          <div class="bar-num">${a.count}</div></div>`).join(''):'<div style="color:var(--muted);font-size:14px;">尚無資料</div>'}
    </div>
    <div class="stat-card"><div class="stat-card-title">地區分布</div>
      ${regions.slice(0,10).map(([r,n])=>`<div class="region-row"><span>${esc(r)}</span><span class="region-cnt">${n} 筆</span></div>`).join('')||'<div style="color:var(--muted);font-size:14px;">尚無資料</div>'}
    </div>
    <div class="stat-card"><div class="stat-card-title">買方 vs 賣方</div>
      <div class="agent-row"><div class="agent-name">🟢 買方</div><div class="bar-wrap"><div class="bar-fill" style="width:${clients.length?Math.round(buyerCount/clients.length*100):0}%;background:var(--buyer)"></div></div><div class="bar-num">${buyerCount}</div></div>
      <div class="agent-row"><div class="agent-name">🟡 賣方</div><div class="bar-wrap"><div class="bar-fill" style="width:${clients.length?Math.round(sellerCount/clients.length*100):0}%;background:var(--seller)"></div></div><div class="bar-num">${sellerCount}</div></div>
    </div>
    <div class="stat-card"><div class="stat-card-title">聯絡紀錄最多</div>
      ${[...clients].sort((a,b)=>(b.notes||[]).length-(a.notes||[]).length).slice(0,8).map(c=>`
        <div class="region-row"><span>${esc(c.name)} <span style="color:var(--muted);font-size:12px;">${esc(c.agent||'')}</span></span><span class="region-cnt">${(c.notes||[]).length} 則</span></div>`).join('')||'<div style="color:var(--muted);font-size:14px;">尚無資料</div>'}
    </div>`;
}

// ── ACCOUNTS ──
function buildAccounts(){
  const grid=document.getElementById('accGrid');
  if(!accounts.length){grid.innerHTML='<div style="color:var(--muted);font-size:14px;padding:12px 0;">還沒有業務帳號</div>';return;}
  grid.innerHTML=accounts.map(a=>{
    const isBoss=a.displayName===BOSS_NAME;
    const clientCount=clients.filter(c=>c.agent===a.displayName).length;
    return`<div class="acc-card">
      <div class="acc-avatar">${(a.displayName||'?')[0]}</div>
      <div class="acc-info">
        <div class="acc-name">${esc(a.displayName)} ${isBoss?'<span class="acc-badge boss">老闆</span>':a.active?'<span class="acc-badge active">啟用</span>':'<span class="acc-badge" style="background:var(--red-bg);color:var(--red)">停用</span>'}</div>
        <div class="acc-meta">帳號：${esc(a.username)} ‧ 密碼：${esc(a.password)} ‧ 客戶 ${clientCount} 筆</div>
      </div>
      ${isBoss?'':
      `<div class="acc-actions">
        ${a.active
          ?`<button class="btn-sm danger" onclick="deleteAccount('${a.username}')">刪除</button>`
          :`<button class="btn-sm" onclick="toggleAccount('${a.username}',true)">啟用</button>`}
      </div>`}
    </div>`;
  }).join('');
}

document.getElementById('addAccBtn').onclick=async()=>{
  const displayName=document.getElementById('newDisplayName').value.trim();
  const username=document.getElementById('newUsername').value.trim();
  const password=document.getElementById('newPassword').value.trim();
  const err=document.getElementById('accErr');
  if(!displayName||!username||!password){err.textContent='請填寫所有欄位';err.style.display='block';return;}
  if(accounts.find(a=>a.username===username)){err.textContent='帳號已存在';err.style.display='block';return;}
  err.style.display='none';
  accounts.push({username,password,displayName,active:true});
  setSyncDot('ing');
  try{
    accountsSha=await ghPut(ACCOUNTS_URL,accounts,accountsSha);
    setSyncDot('ok');
    document.getElementById('newDisplayName').value='';
    document.getElementById('newUsername').value='';
    document.getElementById('newPassword').value='';
    buildAccounts();buildStats();buildOverview();
  }catch{setSyncDot('err');err.textContent='儲存失敗，請重試';err.style.display='block';accounts.pop();}
};

async function deleteAccount(username){
  const acc=accounts.find(a=>a.username===username);if(!acc)return;
  if(!confirm(`確定刪除「${acc.displayName}」？\n他的 ${clients.filter(c=>c.agent===acc.displayName).length} 筆客戶將歸屬「${BOSS_NAME}」`))return;
  // 客戶歸屬老闆
  clients.forEach(c=>{if(c.agent===acc.displayName)c.agent=BOSS_NAME;});
  accounts=accounts.filter(a=>a.username!==username);
  setSyncDot('ing');
  try{
    await Promise.all([
      ghPut(CLIENTS_URL,clients,clientsSha).then(sha=>clientsSha=sha),
      ghPut(ACCOUNTS_URL,accounts,accountsSha).then(sha=>accountsSha=sha)
    ]);
    setSyncDot('ok');buildAll();
  }catch{setSyncDot('err');alert('儲存失敗，請重試');}
}
window.deleteAccount=deleteAccount;

async function toggleAccount(username,active){
  const acc=accounts.find(a=>a.username===username);if(!acc)return;
  acc.active=active;setSyncDot('ing');
  try{accountsSha=await ghPut(ACCOUNTS_URL,accounts,accountsSha);setSyncDot('ok');buildAccounts();}
  catch{setSyncDot('err');}
}
window.toggleAccount=toggleAccount;

// ── MODAL ──
function openMatchModal(buyerId, sellerId){
  const b=clients.find(x=>x.id===buyerId);
  const s=clients.find(x=>x.id===sellerId);
  if(!b||!s)return;
  const {score,detail}=scorePair(b,s);
  const sc=score>=80?'#0e7a4f':score>=60?'#1d4ed8':'#b45309';
  const bg=score>=80?'#dcfce7':score>=60?'#eff4ff':'#fef3c7';
  const f=(label,val)=>val?`<div class="mfield"><div class="mf-label">${label}</div><div class="mf-val">${esc(val)}</div></div>`:'';
  const scoreRow=(label,d)=>`
    <div class="sc-breakdown-row">
      <span class="sc-breakdown-label">${label}（最高${d.max}分）</span>
      <span class="sc-breakdown-val ${d.hit||'miss'}">${d.score}分 ${d.hit==='hit'?'✅':d.hit==='partial'?'⚠️':'—'}</span>
    </div>`;
  document.getElementById('modalTitle').innerHTML=`
    <div style="display:flex;align-items:center;gap:12px;">
      <div style="width:52px;height:52px;border-radius:50%;background:${bg};color:${sc};border:2px solid ${sc};font-size:16px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;">${score}%</div>
      <div>
        <div style="font-size:13px;font-weight:400;color:var(--muted);margin-bottom:2px;">配對詳情</div>
        <span class="role-badge rb-buyer">🟢 ${esc(b.name)}</span> × <span class="role-badge rb-seller">🟡 ${esc(s.name)}</span>
      </div>
    </div>`;
  document.getElementById('modalBody').innerHTML=`
    <div class="msec">
      <div class="msec-title">評分明細</div>
      <div class="sc-breakdown open" style="display:block;">
        ${scoreRow('📍 地區',detail.region)}
        ${scoreRow('💰 預算',detail.price)}
        ${scoreRow('🏠 格局',detail.layout)}
        ${scoreRow('📐 坪數',detail.size)}
        ${scoreRow('🏢 偏好',detail.project)}
        <div class="sc-breakdown-row" style="font-weight:700;font-size:15px;margin-top:4px;">
          <span>總分</span>
          <span style="color:${sc}">${score} / 100</span>
        </div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:4px;">
      <div class="msec" style="margin-bottom:0;">
        <div class="msec-title">🟢 買方 — ${esc(b.name)}</div>
        ${f('負責業務',b.agent)}${f('電話',b.phone)}${f('地區',b.region)}
        ${f('偏好建案',b.buyProject)}${f('格局',b.buyLayout)}${f('坪數',b.buySize)}
        ${f('預算',(b.budgetMin||b.budgetMax)?(b.budgetMin||'?')+'～'+(b.budgetMax||'?')+'萬':'')}
        ${f('其他需求',b.buyNote)}
      </div>
      <div class="msec" style="margin-bottom:0;">
        <div class="msec-title">🟡 賣方 — ${esc(s.name)}</div>
        ${f('負責業務',s.agent)}${f('電話',s.phone)}${f('地區',s.region)}
        ${f('建案名稱',s.sellProject)}${f('格局',s.sellLayout)}${f('坪數',s.sellSize)}
        ${f('開價',s.sellPrice?s.sellPrice+'萬':'')}
        ${f('物件備注',s.sellNote)}
      </div>
    </div>`;
  document.getElementById('modalOverlay').style.display='flex';
}
window.openMatchModal=openMatchModal;

function openModal(id){
  const c=clients.find(x=>x.id===id);if(!c)return;
  const isBuyer=c.role==='buyer';
  const f=(label,val)=>val?`<div class="mfield"><div class="mf-label">${label}</div><div class="mf-val">${esc(val)}</div></div>`:'';
  document.getElementById('modalTitle').textContent=c.name||'（未命名）';
  const notes=c.notes||[];
  document.getElementById('modalBody').innerHTML=`
    <div class="msec"><div class="msec-title">基本資料</div>
      ${f('身份',isBuyer?'🟢 買方':'🟡 賣方')}${f('負責業務',c.agent)}${f('電話',c.phone)}${f('地區',c.region)}${f('地址',c.addr)}
    </div>
    ${isBuyer?`<div class="msec"><div class="msec-title">買方需求</div>
      ${f('偏好建案',c.buyProject)}${f('格局',c.buyLayout)}${f('坪數',c.buySize)}
      ${f('預算',(c.budgetMin||c.budgetMax)?(c.budgetMin||'?')+'～'+(c.budgetMax||'?')+'萬':'')}${f('其他需求',c.buyNote)}</div>`
    :`<div class="msec"><div class="msec-title">賣方物件</div>
      ${f('建案名稱',c.sellProject)}${f('格局',c.sellLayout)}${f('坪數',c.sellSize)}
      ${f('開價',c.sellPrice?c.sellPrice+'萬':'')}${f('物件備注',c.sellNote)}</div>`}
    ${c.generalNote?`<div class="msec">${f('備注',c.generalNote)}</div>`:''}
    <div class="msec"><div class="msec-title">聯絡紀錄（${notes.length} 則）</div>
      ${notes.length?[...notes].reverse().map(n=>`<div class="note-chip"><div class="note-chip-meta">${esc(n.date)}</div><div class="note-chip-text">${esc(n.text)}</div></div>`).join(''):'<div style="color:var(--muted);font-size:13px;">尚無聯絡紀錄</div>'}
    </div>`;
  document.getElementById('modalOverlay').style.display='flex';
}
document.getElementById('modalClose').onclick=()=>document.getElementById('modalOverlay').style.display='none';
document.getElementById('modalOverlay').onclick=e=>{if(e.target===document.getElementById('modalOverlay'))document.getElementById('modalOverlay').style.display='none';};

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ── INIT ──
if(sessionStorage.getItem('admin_ok')&&GH_TOKEN){loadAll();}else{show('loginPage');}
</script>
